stages:
  - id: discover
    name: Discover
    goal: Understand the request and capture the important problem details.
    assigned_agents: [planner]
    max_loops: 2
  - id: design
    name: Design
    goal: Produce a plan for execution.
    assigned_agents: [planner]
    max_loops: 2
  - id: execute
    name: Execute
    goal: Produce deliverable artifacts.
    assigned_agents: [builder]
    max_loops: 2
  - id: validate
    name: Validate
    goal: Validate outputs and record the final status.
    assigned_agents: [reviewer]
    max_loops: 2
